# Footer content is organized in columns, with the first one reserved for social icons (defined in _config.yml).
# You can also add a small print license statement at the bottom.

# Columns (the more you add, the narrower they will be)
columns:
   - description: | # E.g. funding acknowledgement. Can be Markdown
      Living Grasslands is funded through the2023-2024 Biodiversa+ EPSS joint research call BiodivNBS: Nature-based solutions for biodiversity, human well-being and transformative change. 
      
      It is co-funded by the following funding organisations: Swedish research council for sustainable development (FORMAS), South Africa’s Department of Science, Technology and Innovation (DSTI), and the Netherlands Organisation for Scientific Research (NWO). 
     
      
         <div style="display:flex; gap:25px; flex-wrap:wrap; align-items:center;">
            <!-- Biodiversa (not clickable) -->
            <img src="/assets/images/logos/biodiversa_logo.svg"
               alt="BIODIVERSA+"
               style="height:60px;">
      
         <div style="display:flex; gap:25px; flex-wrap:wrap; align-items:center;">
            <!-- Formas (not clickable) -->
            <img src="/assets/images/logos/formas.png"
               alt="Formas"
               style="height:35px;">

         <div style="display:flex; gap:25px; flex-wrap:wrap; align-items:center;">
