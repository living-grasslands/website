            <img src="/assets/images/logos/DSTI-logo-colour_transparent.png"
               alt="DSTI"
               style="height:95px;">

         <div style="display:flex; gap:25px; flex-wrap:wrap; align-items:center;">
            <!-- NWO (not clickable) -->
            <img src="/assets/images/logos/NWO_full_colour.jpg"
               alt="NWO"
               style="height:85px;">
            
